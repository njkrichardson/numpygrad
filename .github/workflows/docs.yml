name: Docs
on:
  push:
    branches: [main, 'docs-*']
    paths: ['docs/**/*.rst', 'docs/**/*.md', 'docs/conf.py', 'docs/requirements.txt']
  pull_request:
    branches: [main]
    paths: ['docs/**/*.rst', 'docs/**/*.md', 'docs/conf.py', 'docs/requirements.txt']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e . && pip install -r docs/requirements.txt
      - name: Build docs
        run: sphinx-build -b html docs docs/_build/html
