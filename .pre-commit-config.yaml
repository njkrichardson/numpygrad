repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4  
    hooks:
      - id: ruff-format
        name: Ruff format
        entry: ruff format
        language: python
        types: [python]
        args: ["."]
      - id: ruff
        name: Ruff lint
        entry: ruff check
        language: python
        types: [python]
        args: ["."]
        additional_dependencies: []
  - repo: local
    hooks:
      - id: check-mypy
        name: Run mypy on push to main
        entry: scripts/run-mypy-on-main
        language: script
        pass_filenames: false
        stages: [pre-push]
  - repo: local
    hooks:
      - id: run-tests
        name: Run full pytest suite on push to main
        entry: scripts/run-tests-on-main
        language: script
        pass_filenames: false
        stages: [pre-push]
